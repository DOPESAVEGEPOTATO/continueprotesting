<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: transparent;
    }
    button {
      padding: 14px 28px;
      font-size: 18px;
      cursor: pointer;
      border-radius: 8px;
      background-color: #4285f4;
      color: white;
      border: none;
      font-family: sans-serif;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
      transition: background-color 0.2s, transform 0.1s;
    }
    button:hover {
      background-color: #2a6dd9;
    }
    button:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>
  <button onclick="randomRedirect()">Continue Protesting</button>

  <script>
    function randomRedirect() {
      const rand = Math.random();
      let destination;

      if (rand < 0.45) {
        destination = "https://sites.google.com/dtechhs.org/delanograpestrikechooseyourown/home/become-known-ending";
      } else if (rand < 0.90) {
        destination = "https://sites.google.com/dtechhs.org/delanograpestrikechooseyourown/home/life-ruined-ending";
      } else {
        destination = "https://sites.google.com/dtechhs.org/delanograpestrikechooseyourown/home/burrrrrn";
      }

      window.top.location.href = destination;
    }
  </script>
</body>
</html>
